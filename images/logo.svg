<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 88" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Stolen Roots</title>
  <desc id="logoDesc">Somali heritage mapping project  Where our heritage went</desc>

  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2f6fbe"/>
      <stop offset="100%" stop-color="#143d73"/>
    </linearGradient>
    <linearGradient id="rootFade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4f8f"/>
      <stop offset="55%" stop-color="#2a5f9e"/>
      <stop offset="100%" stop-color="#7faad4" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#f4f8fc" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b1f3a" flood-opacity="0.18"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="8" y="8" width="72" height="72" rx="18"/>
    </clipPath>
  </defs>

  <!-- Glass pill backdrop -->
  <rect x="0" y="0" width="420" height="88" rx="22" fill="url(#glass)" filter="url(#softShadow)"/>
  <rect x="0.75" y="0.75" width="418.5" height="86.5" rx="21.25" fill="none" stroke="#ffffff" stroke-opacity="0.65"/>

  <!-- Icon mark -->
  <g transform="translate(14, 14)">
    <rect width="60" height="60" rx="16" fill="#eef4fb"/>
    <rect x="0.5" y="0.5" width="59" height="59" rx="15.5" fill="none" stroke="#c8daef"/>

    <!-- Star -->
    <path fill="url(#sky)" d="M30 6 L34.2 20.8 L49.8 20.8 L37.3 29.9 L41.5 44.7 L30 35.6 L18.5 44.7 L22.7 29.9 L10.2 20.8 L25.8 20.8 Z"/>

    <!-- Roots forming Horn of Africa -->
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M30 35.5 C30 40 28 44 26 47 C24 50 22 52 20 54" stroke="url(#rootFade)" stroke-width="2.2"/>
      <path d="M30 35.5 C30 41 32 45 34.5 49 C37 53 39 55.5 41.5 57" stroke="url(#rootFade)" stroke-width="2.2"/>
      <path d="M30 35.5 C30 42 29 46 27.5 50 C26 54 24.5 56 22 58" stroke="#5d8ec0" stroke-width="1.4" opacity="0.75"/>
      <path d="M30 35.5 C30 42 31.5 46 33.5 50 C35.5 54 37 56.5 39 58.5" stroke="#5d8ec0" stroke-width="1.4" opacity="0.75"/>
      <path d="M22 58 C20 57 18 55.5 16.5 53.5" stroke="#8eb5da" stroke-width="1.1" opacity="0.7"/>
      <path d="M39 58.5 C41 57.5 43 55.5 44.5 53" stroke="#8eb5da" stroke-width="1.1" opacity="0.7"/>
      <!-- Global paths -->
      <path d="M16.5 53.5 C12 50 8 46 5 41" stroke="#4189DD" stroke-width="1" stroke-dasharray="2.5 2.5" opacity="0.55"/>
      <path d="M44.5 53 C49 49 53 44 56 38" stroke="#4189DD" stroke-width="1" stroke-dasharray="2.5 2.5" opacity="0.55"/>
    </g>

    <!-- Horn silhouette accent -->
    <path fill="#143d73" opacity="0.12" d="M24 47 C26 50 28 54 29 57 C30.5 54 32 50 34 47 C32 46 30 46 28 46 C26.5 46 25 46.5 24 47 Z"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(92, 0)">
    <text x="0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700" fill="#0f2f57" letter-spacing="-0.3">
      Stolen Roots
    </text>

    <!-- Decorative divider -->
    <line x1="0" y1="46" x2="118" y2="46" stroke="#c5d8ef" stroke-width="1"/>
    <path fill="#4189DD" d="M118 46 L124 43 L130 46 L124 49 Z"/>

    <text x="0" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="9.5" font-weight="600" fill="#3d6794" letter-spacing="2.8">
      WHERE OUR HERITAGE WENT
    </text>

    <text x="0" y="79" font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="600" fill="#6b8fb3" letter-spacing="1.6">
      SOMALI HERITAGE MAPPING PROJECT
    </text>
  </g>

  <!-- Accent bar -->
  <rect x="92" y="82" width="148" height="2.5" rx="1.25" fill="#4189DD" opacity="0.35"/>
</svg>
